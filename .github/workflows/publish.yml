name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # 跳过版本提交本身（bot 推送），避免死循环
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @dolphin-molt/reado version 2>/dev/null || echo "0.0.0")

          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "Current version $CURRENT already published, bumping..."
            npm version patch -m "chore: release v%s"
            git push --follow-tags
          else
            echo "Current version $CURRENT not yet published, using as-is"
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
